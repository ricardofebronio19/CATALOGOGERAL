{% extends "base.html" %}

{% block title %}Adicionar Contato - Catálogo de Peças{% endblock %}

{% block head %}
<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group-full {
        grid-column: 1 / -1;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
        box-sizing: border-box;
    }

    .form-group textarea {
        resize: vertical;
        min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--cor-principal, #ff6600);
        box-shadow: 0 0 0 2px rgba(255, 102, 0, 0.2);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
    }

    .checkbox-group input[type="checkbox"] {
        width: auto;
    }

    .form-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 30px;
    }

    .btn-primary {
        background: var(--cor-principal, #ff6600);
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background 0.2s;
    }

    .btn-primary:hover {
        background: #e55a00;
    }

    .btn-secondary {
        background: #6c757d;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background 0.2s;
    }

    .btn-secondary:hover {
        background: #5a6268;
    }

    .help-text {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }

    .required {
        color: #dc3545;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .form-actions {
            flex-direction: column;
        }

        .form-container {
            padding: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>Adicionar Novo Contato</h1>
        <p>Preencha as informações do contato abaixo</p>
    </div>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="nome">Nome <span class="required">*</span></label>
                <input type="text" id="nome" name="nome" required maxlength="150">
            </div>

            <div class="form-group">
                <label for="empresa">Empresa</label>
                <input type="text" id="empresa" name="empresa" maxlength="200">
            </div>

            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo" maxlength="100">
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" maxlength="20" placeholder="(11) 99999-9999">
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" maxlength="20" placeholder="(11) 99999-9999">
                <div class="help-text">Número para chat direto no WhatsApp</div>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" maxlength="150">
            </div>

            <div class="form-group form-group-full">
                <label for="endereco">Endereço</label>
                <textarea id="endereco" name="endereco" rows="3" placeholder="Rua, número, cidade, CEP..."></textarea>
            </div>

            <div class="form-group form-group-full">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" rows="4" placeholder="Informações adicionais sobre o contato..."></textarea>
            </div>

            <div class="form-group form-group-full">
                <div class="checkbox-group">
                    <input type="checkbox" id="favorito" name="favorito" value="1">
                    <label for="favorito">Marcar como favorito</label>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar Contato</button>
            <a href="{{ url_for('main.listar_contatos') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script>
// Máscara para telefone
function mascaraTelefone(input) {
    let value = input.value.replace(/\D/g, '');
    
    if (value.length <= 11) {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{4,5})(\d{4})$/, '$1-$2');
    }
    
    input.value = value;
}

document.getElementById('telefone').addEventListener('input', function() {
    mascaraTelefone(this);
});

document.getElementById('whatsapp').addEventListener('input', function() {
    mascaraTelefone(this);
});
</script>
{% endblock %}
